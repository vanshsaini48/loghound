business_hours:
  start: "08:00"
  end: "19:00"
  timezone: "UTC"

detections:
  ssh_brute_force:
    enabled: true
    threshold: 5
    window_minutes: 10
  
  successful_after_brute:
    enabled: true
    threshold: 5
    lookback_minutes: 60
  
  off_hours_login:
    enabled: true
  
  web_recon:
    enabled: true
    threshold: 50
    window_minutes: 5
    error_rate_threshold: 0.6
  
  privilege_escalation:
    enabled: true
    window_minutes: 5
  
  suspicious_user_agent:
    enabled: true
