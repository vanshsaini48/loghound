business_hours: { start: "08:00", end: "19:00", timezone: "UTC" }

allowlist:
  ips: ["203.0.113.42"]  # Suppress this attacker IP
  users: []

ioc:
  list_path: "default"

scoring:
  severity_weights: { critical: 10, high: 4, medium: 2, low: 1 }
  ioc_bonus: 5

detections:
  ssh_brute_force: { enabled: true, threshold: 5, window_minutes: 10 }
  successful_after_brute: { enabled: true, window_minutes: 60 }
  off_hours_login: { enabled: true }
  web_recon: { enabled: true, threshold: 50, window_minutes: 5 }
  suspicious_user_agent: { enabled: true }
  privilege_escalation: { enabled: true, window_minutes: 5 }
  password_spraying: { enabled: true }
  new_ip_for_user: { enabled: true }
